services:
  postgres:
    image: postgres:latest
    container_name: labeling-postgres
    environment:
      POSTGRES_USER: label_user
      POSTGRES_PASSWORD: label_pass
      POSTGRES_DB: label_lab
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U label_user -d label_lab"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql

  liquibase:
    build:
      context: .
      dockerfile: Dockerfile
    image: labeling-liquibase:latest
    container_name: labeling-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./:/workspace
    entrypoint: ["liquibase"]

volumes:
  pgdata:
